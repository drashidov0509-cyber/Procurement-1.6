name: Build Procurement v1.6

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Procurement-1.6.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview httpx selectolax openpyxl pyinstaller pdfplumber pillow reportlab

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name "Procurement-1.6" --add-data "ui.html;." --add-data "pdf_parser.py;." --hidden-import _cffi_backend --hidden-import pdfplumber --hidden-import PIL --hidden-import reportlab --hidden-import openpyxl --collect-all webview --noconfirm app.py

      - name: Show result
        run: dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Procurement-1.6-Windows
          path: dist/Procurement-1.6.exe
          retention-days: 90
